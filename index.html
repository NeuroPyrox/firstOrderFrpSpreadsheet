<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic TextBox List</title>
</head>
<body>
  <div> 
    <div>
      <h1>My Textboxes</h1>
      <button id="addBtn">
        Add Box
      </button>
    </div>

    <div id="listContainer">
    </div>
  </div>

  <script>
    const listContainer = document.getElementById('listContainer');
    const addBtn = document.getElementById('addBtn');

    // Load initial boxes
    addItem("First textbox");
    addItem("Second textbox");
    addItem("Third textbox");

    addBtn.addEventListener('click', () => addItem());

    function addItem(text = '') {
      const item = document.createElement('input');
      item.type = "text";
      item.placeholder = "Type something...";
      item.value = text;
      
      listContainer.appendChild(item);
    }

    const createGeneratorMonad = () => {
      const key = Symbol();
      const runMonad = (context, generator) => {
        let step = generator.next();
        while (!step.done) {
          step = generator.next(step.value[key](context));
        }
        return step.value;
      };
      const monadicMethod =
        (field) =>
        (...args) => ({
          [key]: (context) => context[field](...args),
        });
      return [runMonad, monadicMethod];
    };
    
    const [runHtmlMonadWithContext, monadicMethod] = createGeneratorMonad();
    const createElement = monadicMethod("createElement");
    const text = monadicMethod("text");

    class Context {
      constructor() {
        this.elements = [];
      }

      createElement(type) {
        const element = document.createElement(type);
        this.elements.push(element);
        return element;
      }

      text(string) {
        this.elements.push(string);
      }
    }

    function* h1() {
      return yield createElement("h1");
    }

    function* button() {
      yield createElement("button");
      return {
        onClick: () => ({
          map: () => {}
        })
      };
    }
    
    function* div() {
      return yield createElement("div");
    }
    
    // TODO convert this file into FRP using the following code
    function* main() {
      yield* h1("My Textboxes");
      myButton = yield* button("Add Box");
      newTextboxes = myButton.onClick().map(() => function* () {
        yield* input({type: "text", placeholder: "Type something..."});
      })
      yield* div({appendChild: newTextboxes});
    }

    const context = new Context();
    runHtmlMonadWithContext(context, main());
    document.body.append(...context.elements);
  </script>
</body>
</html>
