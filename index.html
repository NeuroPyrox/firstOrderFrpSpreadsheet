<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic TextBox List</title>
</head>
<body>
  <div> 
    <div>
      <h1>My Textboxes</h1>
      <button id="addBtn">
        Add Box
      </button>
    </div>

    <div id="listContainer">
    </div>
  </div>

  <script>
    const listContainer = document.getElementById('listContainer');
    const addBtn = document.getElementById('addBtn');

    // Load initial boxes
    addItem("First textbox");
    addItem("Second textbox");
    addItem("Third textbox");

    addBtn.addEventListener('click', () => addItem());

    function addItem(text = '') {
      const item = document.createElement('input');
      item.type = "text";
      item.placeholder = "Type something...";
      item.value = text;
      
      listContainer.appendChild(item);
    }

    function* h1() {
      yield context => ({
        context: context + "h1 ",
        value: null
      })
    }

    function* button() {
      yield context => ({
        context: context + "button ",
        value: {
          onClick: () => ({
            map: () => {},
          })
        }
      })
    }
    
    function* div() {
      yield context => ({
        context: context + "div ",
        value: null
      })
    }
    
    // TODO convert this file into FRP using the following code
    function* main() {
      yield* h1("My Textboxes");
      myButton = yield* button("Add Box");
      newTextboxes = myButton.onClick().map(() => function* () {
        yield* input({type: "text", placeholder: "Type something..."});
      })
      yield* div({appendChild: newTextboxes});
      return 5;
    }

    console.log(1);
    const runMainMonad = () => {
      console.log(2);
      let context = "string ";
      const generator = main();
      let step = generator.next();
      while (!step.done) {
        console.log(3);
        const response = step.value(context);
        context = response.context;
        step = generator.next(response.value);
      }
      console.log(4);
      if (step.value !== 5) {
        throw "Unexpected return value";
      }
      console.log(context);
    }

    runMainMonad();
  </script>
</body>
</html>
