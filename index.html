<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic TextBox List</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-color: #f1f5f9;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-add {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-add:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .list-item {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.75rem;
    }

    .textbox {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-color);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My Textboxes</h1>
      <button class="btn-add" id="addBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Add Box
      </button>
    </div>

    <div class="list-container" id="listContainer">
      <!-- Items will be generated here -->
    </div>
  </div>

  <script>
    const listContainer = document.getElementById('listContainer');
    const addBtn = document.getElementById('addBtn');

    // Load initial boxes
    addItem("First textbox");
    addItem("Second textbox");
    addItem("Third textbox");

    addBtn.addEventListener('click', () => addItem());

    function addItem(text = '') {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `<input type="text" class="textbox" placeholder="Type something..." value="${text}">`;
      
      listContainer.appendChild(item);
      
      // Auto-focus if newly added
      if (text === '') {
        item.querySelector('.textbox').focus();
      }
    }
  </script>
</body>
</html>
